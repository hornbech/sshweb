<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sshweb</title>
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo-group">
          <img src="/logo.svg" alt="" width="22" height="22">
          <span class="logo">sshweb</span>
        </div>
        <div class="header-actions">
          <button id="creds-btn" title="Manage credentials">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="8" cy="15" r="4"/><path d="M12 15h8M16 12v6"/>
            </svg>
          </button>
          <button id="scan-btn" title="Scan network for SSH servers">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="5.5" cy="5.5" r="4"/><line x1="8.5" y1="8.5" x2="12" y2="12"/>
            </svg>
          </button>
          <button id="new-conn-btn" title="New connection">+</button>
        </div>
      </div>
      <ul id="connection-list"></ul>
      <section id="web-section">
        <header class="web-header">
          <h2>Web</h2>
          <button id="add-bookmark" title="Add bookmark">+</button>
        </header>
        <ul id="bookmark-list"></ul>
      </section>
      <div id="admin-panel">
        <div class="admin-row">
          <span id="status-dot" class="dot green"></span>
          <span id="uptime">—</span>
        </div>
        <div id="active-sessions-list"></div>
        <div id="admin-web">
          <div>Cookie sessions: <span id="admin-web-cookies">0</span></div>
          <div>Open web tabs: <span id="admin-web-tabs">0</span></div>
          <button id="admin-web-clear" class="secondary">Clear web cookies</button>
        </div>
        <button id="lock-btn" class="danger">Lock Server</button>
        <button id="change-pw-btn" class="secondary">Change Password</button>
      </div>
      <div id="sidebar-footer">
        <span>by <a href="https://github.com/hornbech/sshweb" target="_blank" rel="noopener noreferrer">hornbech</a></span>
        <a href="https://github.com/hornbech/sshweb" target="_blank" rel="noopener noreferrer">GitHub</a>
      </div>
    </aside>
    <main id="main">
      <div id="tabs"></div>
      <div id="terminal-container"></div>
      <div id="no-connection">
        <p>Select a connection or add a new one.</p>
      </div>
    </main>
  </div>

  <!-- Network scan modal -->
  <div id="scan-modal" class="hidden">
    <div class="modal-card scan-card">
      <h2>Scan Network for SSH</h2>
      <div class="scan-controls">
        <input id="scan-subnet" type="text" placeholder="e.g. 10.0.0.0/24" spellcheck="false" autocomplete="off">
        <button id="scan-start-btn" type="button">Scan</button>
      </div>
      <p id="scan-status" class="scan-status"></p>
      <ul id="scan-results" class="scan-results"></ul>
      <div class="modal-actions">
        <button type="button" id="scan-close-btn">Close</button>
      </div>
    </div>
  </div>

  <!-- Credentials modal -->
  <div id="creds-modal" class="hidden">
    <div class="modal-card creds-card">
      <h2>Credentials</h2>
      <ul id="creds-list" class="creds-list"></ul>
      <hr class="modal-divider">
      <h3 id="creds-form-title">Add Credential</h3>
      <form id="creds-form">
        <input type="hidden" name="id">
        <input name="name" placeholder="Name (e.g. Home Lab Admin)" required>
        <input name="username" placeholder="Username" required>
        <select name="authType">
          <option value="password">Password</option>
          <option value="key">Private Key</option>
        </select>
        <input name="secret" type="password" placeholder="Password or paste private key" required>
        <p id="creds-error" class="error hidden"></p>
        <div class="modal-actions">
          <button type="button" id="creds-cancel">Cancel</button>
          <button type="submit" id="creds-submit">Add</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Bookmark modal -->
  <div id="bookmark-modal" class="hidden">
    <div class="modal-card">
      <h2 id="bookmark-modal-title">Add Bookmark</h2>
      <form id="bookmark-form">
        <input type="hidden" name="id">
        <input name="label" placeholder="Label (e.g. Pi-hole)" required>
        <input name="url" type="url" placeholder="http://192.168.1.5/admin" required>
        <label class="checkbox-label">
          <input name="ignoreTls" type="checkbox"> Ignore TLS errors
        </label>
        <p id="bookmark-error" class="error hidden"></p>
        <div class="modal-actions">
          <button type="button" id="bookmark-cancel">Cancel</button>
          <button type="submit" id="bookmark-submit">Add</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Change password modal -->
  <div id="change-pw-modal" class="hidden">
    <div class="modal-card">
      <h2>Change Password</h2>
      <form id="change-pw-form">
        <input name="currentPassword" type="password" placeholder="Current password" required autocomplete="current-password">
        <input name="newPassword" type="password" placeholder="New password" required autocomplete="new-password">
        <input name="confirmPassword" type="password" placeholder="Confirm new password" required autocomplete="new-password">
        <p id="change-pw-error" class="error hidden"></p>
        <div class="modal-actions">
          <button type="button" id="change-pw-cancel">Cancel</button>
          <button type="submit">Change Password</button>
        </div>
      </form>
    </div>
  </div>

  <!-- New/Edit connection modal -->
  <div id="modal" class="hidden">
    <div class="modal-card">
      <h2 id="modal-title">New Connection</h2>
      <form id="conn-form">
        <input name="label" placeholder="Label (e.g. My Server)" required>
        <input name="host" placeholder="Host / IP" required>
        <input name="port" type="number" value="22" required>
        <select name="credentialId" id="cred-select">
          <option value="">— enter credentials below —</option>
        </select>
        <div id="inline-cred-fields">
          <input name="username" placeholder="Username">
          <select name="authType">
            <option value="password">Password</option>
            <option value="key">Private Key</option>
          </select>
          <input name="secret" type="password" placeholder="Password or paste private key">
        </div>
        <div class="modal-actions">
          <button type="button" id="cancel-btn">Cancel</button>
          <button type="submit">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
